---
name: images

on:
  workflow_call:
    inputs:
      push:
        description: "push images and create the multi-arch manifest list"
        type: boolean
        default: true
      build-version:
        description: "value for the VERSION build-arg"
        type: string
        required: true
      tags:
        description: "docker/metadata-action tag rules applied to every image"
        type: string
        required: false
        default: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=sha,prefix=,format=short
          type=raw,value=dev-latest,enable={{is_default_branch}}

permissions:
  contents: read
  packages: write

jobs:
  build-images:
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: clabernetes-manager
            file: build/manager.Dockerfile
            context: "."
          - name: clabernetes-launcher
            file: build/launcher.Dockerfile
            context: "."
          - name: clabernetes-ui
            file: build/ui.Dockerfile
            context: ui
          - name: clabverter
            file: build/clabverter.Dockerfile
            context: "."
        platform:
          - arch: amd64
            target: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            target: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: login to ghcr
        if: ${{ inputs.push }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: set up buildx
        uses: docker/setup-buildx-action@v4

      - name: build image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.file }}
          platforms: ${{ matrix.platform.target }}
          build-args: |
            VERSION=${{ inputs.build-version }}
          provenance: false
          cache-from: type=gha,scope=${{ matrix.image.name }}-${{ matrix.platform.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}-${{ matrix.platform.arch }}
          outputs: ${{ inputs.push && format('type=image,name=ghcr.io/srl-labs/clabernetes/{0},push-by-digest=true,name-canonical=true,push=true', matrix.image.name) || 'type=cacheonly' }}

      - name: export digest
        if: ${{ inputs.push }}
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: upload digest
        if: ${{ inputs.push }}
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.image.name }}-${{ matrix.platform.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    if: ${{ inputs.push }}
    needs: build-images
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        image:
          - clabernetes-manager
          - clabernetes-launcher
          - clabernetes-ui
          - clabverter
    steps:
      - name: download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-${{ matrix.image }}-*
          merge-multiple: true

      - name: login to ghcr
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: set up buildx
        uses: docker/setup-buildx-action@v4

      - name: extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/srl-labs/clabernetes/${{ matrix.image }}
          flavor: latest=auto
          tags: |
            ${{ inputs.tags }}
            type=raw,value=${{ inputs.build-version }}

      - name: create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/srl-labs/clabernetes/${{ matrix.image }}@sha256:%s ' *)

      - name: inspect image
        run: |
          docker buildx imagetools inspect \
            ghcr.io/srl-labs/clabernetes/${{ matrix.image }}:${{ inputs.build-version }}
