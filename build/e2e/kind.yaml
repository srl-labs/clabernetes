---
# minimal single-node, single-stack KinD config used by the e2e flow (`make
# test-e2e-local` and CI). single-stack keeps it portable across GitHub runners;
# no UI port mapping or MetalLB is needed because the e2e tests only assert the
# rendered kubernetes objects and normalize loadbalancer/status fields away.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
