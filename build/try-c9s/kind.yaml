---
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
networking:
  ipFamily: dual
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 32767
        hostPort: 3000
        listenAddress: "0.0.0.0"
    kubeadmConfigPatches:
      - |
        kind: KubeletConfiguration
        streamingConnectionIdleTimeout: "96h0m0s"
