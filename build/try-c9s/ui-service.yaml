---
apiVersion: v1
kind: Service
metadata:
  labels:
    try-c9s: "true"
  name: try-c9s-ui
  namespace: clabernetes
spec:
  type: NodePort
  ports:
    - name: http
      nodePort: 32767
      port: 80
      protocol: TCP
      targetPort: 3000
  selector:
    clabernetes/app: clabernetes
    clabernetes/name: clabernetes-ui
    clabernetes/component: ui
